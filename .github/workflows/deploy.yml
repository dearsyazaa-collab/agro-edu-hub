name: Build & Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # ============================================================
      # PILIH SALAH SATU METODE DEPLOY DI BAWAH INI
      # Uncomment metode yang sesuai dengan server hosting Anda
      # ============================================================

      # ----------------------------------------------------------
      # METODE 1: Deploy via SCP (SSH) ke server hosting
      # ----------------------------------------------------------
      # Tambahkan secrets berikut di GitHub repo Settings > Secrets:
      #   - SSH_HOST       : IP atau domain server (contoh: 123.456.78.90)
      #   - SSH_USERNAME   : username SSH (contoh: root atau www-data)
      #   - SSH_PRIVATE_KEY: isi dari private key SSH (~/.ssh/id_rsa)
      #   - SSH_PORT       : port SSH (default: 22)
      #   - DEPLOY_PATH    : path di server (contoh: /var/www/agro-edu-hub)

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "out/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      # ----------------------------------------------------------
      # METODE 2: Deploy via FTP (jika hosting pakai cPanel/FTP)
      # ----------------------------------------------------------
      # Uncomment blok di bawah dan comment blok SSH di atas
      # Tambahkan secrets:
      #   - FTP_SERVER   : alamat FTP server
      #   - FTP_USERNAME : username FTP
      #   - FTP_PASSWORD : password FTP

